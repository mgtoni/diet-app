name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Type Check Core
      run: npm run typecheck --workspace=packages/core

    - name: Type Check DB
      run: npm run typecheck --workspace=packages/db

    - name: Build Web App
      run: npm run build --workspace=apps/web
